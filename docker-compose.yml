services:
  # ─── React PWA Client ──────────────────────────────────────
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: studynotes-client
    ports:
      - "3000:80"
    depends_on:
      - server
    restart: unless-stopped
    networks:
      - studynotes-net

  # ─── Express API Server ────────────────────────────────────
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: studynotes-server
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - TTS_SERVICE_URL=http://tts-service:5001
    depends_on:
      - tts-service
    restart: unless-stopped
    networks:
      - studynotes-net

  # ─── Flask TTS Microservice ────────────────────────────────
  tts-service:
    build:
      context: ./tts-service
      dockerfile: Dockerfile
    container_name: studynotes-tts
    ports:
      - "5001:5001"
    restart: unless-stopped
    networks:
      - studynotes-net

networks:
  studynotes-net:
    driver: bridge
